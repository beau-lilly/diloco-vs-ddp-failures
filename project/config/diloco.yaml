framework: diloco

# Inner AdamW — fresh each outer step
inner_optimizer:
  name: adamw
  lr: 3.0e-4
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  cosine_decay: true
  warmup_steps: 200
  min_lr_mult: 0.1

# Outer SGD+Nesterov — persistent buffer, constant LR
outer_optimizer:
  name: sgd_nesterov
  lr: 0.7
  momentum: 0.9

diloco:
  H: 50                              # overridden by --H CLI arg
  outer_state_path: checkpoints/diloco/outer_state.pt
  outer_state_dir: checkpoints/diloco
  # Write outer_state.pt every K outer steps. K=1 is only needed for the
  # SIGKILL-based rejoin path where the replacement reads from disk. The
  # in-process virtual-crash path never reads this file, so at very large
  # H (where writes are ~1.5 GB a pop) we can skip them without losing any
  # correctness. K=999 effectively disables steady-state writes; a final
  # snapshot would still be useful if we needed one but we don't.
  outer_state_write_every: 999
